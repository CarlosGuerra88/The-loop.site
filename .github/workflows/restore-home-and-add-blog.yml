name: Restore original homepage and add blog safely

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/restore-home-and-add-blog.yml'

permissions:
  contents: write

jobs:
  restore-and-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore original homepage and add isolated blog components
        shell: bash
        run: |
          git show 30b3167a8ab07e0104895bce0843cce8dae42afe:index.html > index.html
          python3 <<'PY'
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          css = r'''
          <style>
          /* Blog preview and mobile navigation added without changing existing sections */
          .blog-preview{background:linear-gradient(180deg,rgba(124,58,237,.055),rgba(182,255,59,.018));}
          .blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
          .blog-card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.012));border-radius:18px;overflow:hidden;text-decoration:none;color:var(--text);transition:.22s ease;display:flex;flex-direction:column;}
          .blog-card:hover{transform:translateY(-4px);border-color:rgba(182,255,59,.42);box-shadow:0 18px 50px rgba(0,0,0,.4);}
          .blog-cover{aspect-ratio:16/9;display:grid;place-items:center;background:radial-gradient(circle at 65% 28%,rgba(182,255,59,.12),transparent 28%),linear-gradient(135deg,#15151a,#080809);border-bottom:1px solid var(--line);font-family:Manrope,sans-serif;font-weight:900;font-size:52px;color:var(--lime);}
          .blog-body{padding:24px;display:flex;flex-direction:column;gap:10px;flex:1;}
          .blog-tag{font-size:10px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;color:var(--violet);}
          .blog-card h3{font-size:20px;}
          .blog-card p{font-size:14px;color:var(--muted);margin:0;}
          .blog-link{font-family:Manrope,sans-serif;font-size:13px;font-weight:800;color:var(--lime);margin-top:auto;padding-top:8px;}
          .blog-actions{text-align:center;margin-top:30px;}
          .menu-toggle{display:none;width:42px;height:42px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.04);color:var(--text);cursor:pointer;align-items:center;justify-content:center;flex-direction:column;gap:5px;position:relative;z-index:62;}
          .menu-toggle span{display:block;width:20px;height:2px;border-radius:999px;background:currentColor;transition:transform .25s ease,opacity .2s ease;}
          .menu-toggle[aria-expanded="true"] span:nth-child(1){transform:translateY(7px) rotate(45deg);}
          .menu-toggle[aria-expanded="true"] span:nth-child(2){opacity:0;}
          .menu-toggle[aria-expanded="true"] span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
          body.menu-open{overflow:hidden;}
          @media(max-width:900px){.blog-grid{grid-template-columns:1fr 1fr;}}
          @media(max-width:820px){
            .topbar .wrap{gap:12px;}
            .menu-toggle{display:flex;}
            .topbar .nav-cta{display:none;}
            .nav-links{position:fixed;top:60px;left:0;right:0;display:flex!important;flex-direction:column;align-items:stretch;gap:0;padding:16px 24px 26px;background:rgba(5,5,5,.98);backdrop-filter:blur(18px);border-bottom:1px solid var(--line);transform:translateY(-125%);opacity:0;visibility:hidden;pointer-events:none;transition:transform .28s ease,opacity .22s ease,visibility .22s ease;z-index:61;}
            .nav-links.open{transform:translateY(0);opacity:1;visibility:visible;pointer-events:auto;}
            .nav-links a{display:block;padding:15px 3px;border-bottom:1px solid var(--line);font-size:16px;color:var(--text);}
            .nav-links a:last-child{border-bottom:0;}
            .mobile-nav-cta{margin-top:16px!important;border:0!important;border-radius:999px;background:var(--lime);color:#06160a!important;text-align:center;font-weight:900!important;}
          }
          @media(max-width:560px){.blog-grid{grid-template-columns:1fr;}.blog-cover{font-size:44px;}}
          </style>
          '''

          blog = r'''
          <section class="sec blog-preview" id="blog">
            <div class="wrap">
              <div class="shead">
                <span class="eyebrow l">Blog The Loop</span>
                <h2>Ideas, sistemas y growth para vender más.</h2>
                <p class="sub">Contenido accionable sobre performance, experimentación, automatización, IA y métricas de negocio.</p>
              </div>
              <div class="blog-grid">
                <a class="blog-card reveal" href="/blog/#cuello-de-botella"><div class="blog-cover">↗</div><div class="blog-body"><span class="blog-tag">Estrategia</span><h3>Rompe el cuello de botella</h3><p>Encuentra el punto que está frenando todo tu sistema de crecimiento.</p><span class="blog-link">Leer artículo →</span></div></a>
                <a class="blog-card reveal" href="/blog/que-es-growth-hacking/"><div class="blog-cover">✦</div><div class="blog-body"><span class="blog-tag">Growth</span><h3>Encuentra tu norte</h3><p>Define la métrica que debe orientar las decisiones de marketing y negocio.</p><span class="blog-link">Leer artículo →</span></div></a>
                <a class="blog-card reveal" href="/blog/#metricas"><div class="blog-cover">◉</div><div class="blog-body"><span class="blog-tag">Analítica</span><h3>Métricas que impulsan</h3><p>Separa los indicadores que mueven ventas de las métricas decorativas.</p><span class="blog-link">Leer artículo →</span></div></a>
              </div>
              <div class="blog-actions"><a class="cta" href="/blog/">Explorar el blog →</a></div>
            </div>
          </section>
          <div class="divider"></div>
          '''

          menu_script = r'''
          <script>
          (function(){
            var button=document.querySelector('.menu-toggle');
            var nav=document.getElementById('mobileNav');
            if(!button||!nav)return;
            function closeMenu(){button.setAttribute('aria-expanded','false');button.setAttribute('aria-label','Abrir menú');nav.classList.remove('open');document.body.classList.remove('menu-open');}
            button.addEventListener('click',function(){var open=button.getAttribute('aria-expanded')==='true';button.setAttribute('aria-expanded',String(!open));button.setAttribute('aria-label',open?'Abrir menú':'Cerrar menú');nav.classList.toggle('open',!open);document.body.classList.toggle('menu-open',!open);});
            nav.querySelectorAll('a').forEach(function(link){link.addEventListener('click',closeMenu);});
            window.addEventListener('resize',function(){if(window.innerWidth>820)closeMenu();});
            document.addEventListener('keydown',function(event){if(event.key==='Escape')closeMenu();});
          })();
          </script>
          '''

          html = html.replace('</head>', css + '\n</head>', 1)
          html = html.replace('<a href="#founders">Founders</a>', '<a href="/blog/">Blog</a>\n      <a href="#founders">Founders</a>', 1)
          html = html.replace('<nav class="nav-links">', '<nav class="nav-links" id="mobileNav">', 1)
          desktop_cta = '<a class="nav-cta" href="https://calendly.com/the-loop-marketing" target="_blank" rel="noopener">Diagnóstico gratuito →</a>'
          hamburger = desktop_cta + '\n    <button class="menu-toggle" type="button" aria-label="Abrir menú" aria-controls="mobileNav" aria-expanded="false"><span></span><span></span><span></span></button>'
          html = html.replace(desktop_cta, hamburger, 1)
          html = html.replace('</nav>', '      <a class="mobile-nav-cta" href="https://calendly.com/the-loop-marketing" target="_blank" rel="noopener">Diagnóstico gratuito →</a>\n    </nav>', 1)
          html = html.replace('<div class="divider"></div>\n\n<!-- FOUNDERS -->', blog + '\n<!-- FOUNDERS -->', 1)
          html = html.replace('</body>', menu_script + '\n</body>', 1)
          html = html.replace('<a href="#metodo">Método</a>\n      <a href="https://calendly.com/the-loop-marketing"', '<a href="#metodo">Método</a>\n      <a href="/blog/">Blog</a>\n      <a href="https://calendly.com/the-loop-marketing"', 1)
          path.write_text(html, encoding='utf-8')

          thanks = '''<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Suscripción confirmada · The Loop</title><meta name="robots" content="noindex,follow"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>:root{--black:#050505;--panel:#0c0c0e;--violet:#7C3AED;--lime:#B6FF3B;--text:#F4F4F5;--muted:rgba(255,255,255,.62);--line:rgba(255,255,255,.12)}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% 10%,rgba(124,58,237,.24),transparent 34%),var(--black);color:var(--text);font-family:Inter,sans-serif;display:grid;place-items:center;padding:24px}.card{width:min(680px,100%);padding:clamp(30px,6vw,58px);border:1px solid var(--line);border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.016));box-shadow:0 32px 90px rgba(0,0,0,.5);text-align:center}.mark{width:64px;height:64px;margin:0 auto 24px;border-radius:18px;background:rgba(182,255,59,.12);border:1px solid rgba(182,255,59,.3);display:grid;place-items:center;color:var(--lime);font-size:30px;font-weight:900}.eyebrow{font-size:11px;font-weight:900;letter-spacing:.17em;text-transform:uppercase;color:var(--lime)}h1{font-family:Manrope,sans-serif;font-size:clamp(32px,6vw,54px);line-height:1.04;letter-spacing:-.04em;margin:14px 0 18px}p{color:var(--muted);font-size:17px;line-height:1.7;margin:0 auto 28px;max-width:52ch}.actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;padding:15px 22px;border-radius:14px;text-decoration:none;font-family:Manrope,sans-serif;font-weight:900}.primary{background:var(--lime);color:#06160a}.secondary{border:1px solid var(--line);color:var(--text)}</style></head><body><main class="card"><div class="mark">✓</div><div class="eyebrow">Suscripción confirmada</div><h1>Ya eres parte de The Loop.</h1><p>Gracias por suscribirte. Revisa tu correo: pronto recibirás contenido práctico sobre growth, automatización, IA, performance y sistemas de ventas.</p><div class="actions"><a class="btn primary" href="/blog/">Explorar el blog →</a><a class="btn secondary" href="/">Volver al inicio</a></div></main></body></html>'''
          Path('gracias-blog').mkdir(exist_ok=True)
          Path('gracias-blog/index.html').write_text(thanks, encoding='utf-8')
          PY

      - name: Commit restored homepage and blog additions
        shell: bash
        run: |
          git config user.name "The Loop Automation"
          git config user.email "actions@users.noreply.github.com"
          git add index.html gracias-blog/index.html
          git commit -m "Restore original homepage and integrate blog safely"
          git push
